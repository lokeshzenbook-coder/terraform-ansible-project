---
- name: Install and configure Nginx and Python3
  hosts: webservers
  become: true

  handlers:
    - name: Restart nginx
      service:
        name: nginx
        state: restarted

  tasks:

    - name: Add official Nginx stable repo
      yum_repository:
        name: nginx-stable
        description: Nginx stable repository
        baseurl: "http://nginx.org/packages/amzn/2023/$basearch/"
        gpgcheck: yes
        gpgkey: https://nginx.org/keys/nginx_signing.key
        enabled: yes
        state: present

    - name: Install Nginx
      dnf:
        name: nginx
        state: present
      notify: Restart nginx

    - name: Install Python3
      dnf:
        name: python3
        state: present

    - name: Ensure Nginx is started and enabled on boot
      service:
        name: nginx
        state: started
        enabled: yes

    - name: Open port 80 via firewalld (if active)
      firewalld:
        service: http
        permanent: yes
        state: enabled
        immediate: yes
      ignore_errors: yes
